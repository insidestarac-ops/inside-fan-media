
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Nommés – Inside Star Ac</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" sizes="32x32" href="logo-star-ac.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --violet:#7C4DFF;
  --violet-soft:#EDE7FF;
  --bg:#F7F6FF;
  --card:#FFFFFF;
  --text:#1E1E2E;
  --muted:#6E6E90;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:1300px;
  margin:auto;
  padding:0 24px;
}

/* ===== HERO PAGE ===== */
.page-hero{
  background:
    radial-gradient(circle at top left,#b39dff,transparent 55%),
    linear-gradient(135deg,#7C4DFF,#5E35FF);
  color:#fff;
  padding:110px 0;
}
.page-hero h1{
  font-size:48px;
  margin:0 0 12px;
}
.page-hero p{
  max-width:620px;
  font-size:18px;
  opacity:.95;
}

/* ===== SECTIONS ===== */
.section{padding:90px 0}
.section-title{
  font-size:30px;
  margin-bottom:36px;
}

/* ===== CLASSEMENT ===== */
.ranking-table-wrapper{
  background:#fff;
  border-radius:28px;
  padding:32px;
  box-shadow:0 24px 60px rgba(124,77,255,.22);
  overflow-x:auto;
}

.ranking-table{
  width:100%;
  border-collapse:collapse;
}

.ranking-table thead th{
  text-align:left;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.8px;
  color:var(--muted);
  padding-bottom:16px;
}

.ranking-table tbody tr{
  border-top:1px solid #eee;
}

.ranking-table td{
  padding:18px 0;
  vertical-align:middle;
}

.rank{
  font-weight:900;
  font-size:20px;
  color:var(--violet);
}

.couple{
  display:flex;
  align-items:center;
  gap:16px;
  font-weight:700;
}

.couple img{
  width:64px;
  height:64px;
  object-fit:cover;
  border-radius:18px;
}

.votes{
  font-weight:800;
}

.trend{
  font-size:18px;
  font-weight:900;
}

.trend.up{color:#2ecc71}
.trend.down{color:#e74c3c}
.trend.stable{color:#aaa}

.ranking-note{
  margin-top:18px;
  font-size:13px;
  color:var(--muted);
}

/* ===== TOP 3 HIGHLIGHT ===== */
.ranking-table tbody tr:first-child .rank{
  color:#f1c40f; /* Or */
}
.ranking-table tbody tr:nth-child(2) .rank{
  color:#bdc3c7; /* Argent */
}
.ranking-table tbody tr:nth-child(3) .rank{
  color:#cd7f32; /* Bronze */
}

/* ===== PLACEHOLDER CLASSEMENT (TEMPORAIRE) ===== */
.ranking-table-wrapper{
  padding:80px 32px;
  text-align:center;
  overflow:visible;
}

.ranking-table-wrapper h3{
  font-size:24px;
  font-weight:800;
  color:var(--violet);
  margin-bottom:12px;
}

.ranking-table-wrapper p{
  font-size:16px;
  color:var(--muted);
  line-height:1.6;
  margin:0;
}


</style>

<link rel="stylesheet" href="CSS-Mobile.css">

</head>

<body>

<div id="header-placeholder"></div>
  
<main>

  <section class="page-hero">
    <div class="container">
      <h1>Les Nommés</h1>
      <p>
        Ils sont en danger cette semaine. Votez pour sauver votre académicien préféré.
      </p>
    </div>
  </section>

  <section class="section">
    <div class="container">

      <div class="ranking-table-wrapper">
        <h3>À l'année prochaine...</h3>
      </div>

    </div>
  </section>

</main>

<div id="footer-placeholder"></div>

<script src="header.js"></script>
<script src="footer.js"></script>
<script src="menu.js"></script>

</body>
</html>
