<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Contact – Inside Fan Media</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" sizes="32x32" href="logo-inside-fan-media.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --violet:#7C4DFF;
  --violet-soft:#EDE7FF;
  --bg:#F7F6FF;
  --card:#FFFFFF;
  --text:#1E1E2E;
  --muted:#6E6E90;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:1200px;
  margin:auto;
  padding:0 24px;
}

/* ===== HERO ===== */
.page-hero{
  background:
    radial-gradient(circle at top left,#b39dff,transparent 55%),
    linear-gradient(135deg,#7C4DFF,#5E35FF);
  color:#fff;
  padding:110px 0;
}
.page-hero h1{
  font-size:48px;
  margin:0 0 12px;
}
.page-hero p{
  max-width:620px;
  font-size:18px;
}

/* ===== SECTION ===== */
.section{padding:90px 0}

/* ===== FORM CARD ===== */
.contact-card{
  max-width:560px;
  margin:auto;
  background:#fff;
  border-radius:30px;
  padding:40px;
  box-shadow:0 24px 60px rgba(124,77,255,.22);
}

.contact-card h2{
  margin-top:0;
  font-size:26px;
}
.contact-card p{
  color:var(--muted);
  margin-bottom:28px;
}

/* ===== FORM ===== */
.form-group{margin-bottom:22px}

label{
  display:block;
  font-size:13px;
  font-weight:700;
  margin-bottom:8px;
}

input,textarea{
  width:100%;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid #ddd;
  font-family:inherit;
  font-size:14px;
}

input:focus,textarea:focus{
  outline:none;
  border-color:var(--violet);
  box-shadow:0 0 0 3px var(--violet-soft);
}

textarea{
  min-height:140px;
  resize:vertical;
}

/* ===== BUTTON ===== */
.submit-btn{
  padding:14px 28px;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,#7C4DFF,#5E35FF);
  color:#fff;
  font-weight:800;
  cursor:pointer;
  transition:.3s;
}
.submit-btn:hover{
  transform:scale(1.05);
  box-shadow:0 14px 32px rgba(124,77,255,.45);
}

/* ===== SUCCESS MESSAGE ===== */
#form-success{
  display:none;
  text-align:center;
  font-weight:800;
  font-size:16px;
  color:#2ECC71;
  padding:40px 20px;
}

</style>

<link rel="stylesheet" href="CSS-Mobile.css">

</head>

<body>

<div id="header-placeholder"></div>
  
<main>

<section class="page-hero">
  <div class="container">
    <h1>Contact</h1>
    <p>Une question, une suggestion ou un partenariat ? Écris-nous.</p>
  </div>
</section>

<section class="section">
  <div class="contact-card">

  <!-- CONTENU À CACHER -->
  <div id="form-wrapper">
    <h2>Nous contacter</h2>
    <p>Remplis le formulaire ci-dessous.</p>

    <form id="contact-form" action="https://formspree.io/f/xeeoyllv" method="POST">

      <input type="hidden" name="_subject" value="📩 Nouveau message – Inside Fan Media">
      <input type="text" name="_gotcha" style="display:none">

      <div class="form-group">
        <label>Nom</label>
        <input type="text" name="nom" placeholder="Votre nom..." required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="Votre e-mail..." required>
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea name="message" placeholder="Votre message..." required></textarea>
      </div>

      <button type="submit" class="submit-btn">Envoyer</button>
    </form>
  </div>

  <!-- MESSAGE DE SUCCÈS -->
  <div id="form-success">
    ✅ Merci pour ton message,<br>nous te répondrons rapidement.
  </div>

</div>

</section>

</main>

<script>
const form = document.getElementById('contact-form');
const successMsg = document.getElementById('form-success');
const formWrapper = document.getElementById('form-wrapper');

form.addEventListener('submit', function(e){
  e.preventDefault();

  const formData = new FormData(form);

  fetch(form.action, {
    method: form.method,
    body: formData,
    headers: { 'Accept': 'application/json' }
  })
  .then(response => {
    if(response.ok){
      formWrapper.style.display = "none";
      successMsg.style.display = "block";
      form.reset();
    } else {
      alert("Une erreur est survenue. Réessaie plus tard.");
    }
  })
  .catch(() => {
    alert("Impossible d'envoyer le message.");
  });
});
</script>

<div id="footer-placeholder"></div>

<script src="header.js"></script>
<script src="footer.js"></script>
<script src="menu.js"></script>

</body>
</html>
