<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Résultats – Inside Star Ac</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" sizes="32x32" href="logo-star-ac.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --violet:#7C4DFF;
  --violet-soft:#EDE7FF;
  --bg:#F7F6FF;
  --card:#FFFFFF;
  --text:#1E1E2E;
  --muted:#6E6E90;
  --danger:#FF4D6D;
  --success:#2ECC71;
}
*,
*::before,
*::after{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ===== CONTAINER ===== */
.container{
  max-width:1300px;
  margin:auto;
  padding:0 24px;
}

/* ===== HERO ===== */
.page-hero{
  background:
    radial-gradient(circle at top left,#b39dff,transparent 55%),
    linear-gradient(135deg,#7C4DFF,#5E35FF);
  color:#fff;
  padding:110px 0;
}
.page-hero h1{
  font-size:48px;
  margin:0 0 12px;
}
.page-hero p{
  max-width:640px;
  font-size:18px;
  opacity:.95;
}

/* ===== SECTION ===== */
.section{
  padding:90px 0;
}

/* Contenu */
.nominee-content{
  padding:20px 18px 26px;
  text-align:center;
}
.nominee-content h3{
  margin:0 0 6px;
  font-size:20px;
  font-weight:900;
}
.nominee-content span{
  display:block;
  font-size:13px;
  color:var(--muted);
  margin-bottom:16px;
}

/* ===== MODERN RESULTS ===== */
.live-badge{
  display:inline-block;
  background:#FF4D6D;
  color:#fff;
  padding:6px 14px;
  border-radius:999px;
  font-weight:800;
  font-size:12px;
  margin-bottom:14px;
  box-shadow:0 0 14px rgba(255,77,109,.6);
}

/* ===== VOTE CARD ===== */
.vote-card{
  max-width:720px;
  margin:0 auto;
  background:#fff;
  border-radius:28px;
  padding:18px;
  box-shadow:0 30px 80px rgba(124,77,255,.25);
}

.vote-disclaimer{
  margin-top:18px;
  text-align:center;
  font-size:13px;
  color:var(--muted);
  opacity:.85;
}

</style>

<link rel="stylesheet" href="CSS-Mobile.css">

</head>

<body>

<div id="header-placeholder"></div>
  
<main>

<section class="page-hero">
  <div class="container">
    <span class="live-badge">● EN DIRECT</span>
    <h1>Vote du public</h1>
    <p>Sondage interne et privé réalisé par Inside Fan Media </br> 
      Ce vote n’est <strong>pas officiel</strong> et n’est <strong>pas affilié à TF1</strong>
    </p>

  </div>
</section>

<section class="section">
  <div class="container">

    <!-- PAS de card -->
    <iframe
      data-tally-src="https://tally.so/embed/vGYPPQ?transparentBackground=1&dynamicHeight=1"
      loading="lazy"
      width="100%"
      height="1"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      title="Vote du public">
    </iframe>
<p class="vote-disclaimer">
 Pour qu’un vote soit réellement comptabilisé, envoyez le <strong>numéro</strong> au <strong>71500 (0,99 € + SMS)</strong> afin de sauver l’un d’entre eux !
</p>

  </div>
</section>

<script src="https://tally.so/widgets/embed.js"></script>

<div id="footer-placeholder"></div>

<script src="header.js"></script>
<script src="footer.js"></script>
<script src="menu.js"></script>

</body>
</html>
